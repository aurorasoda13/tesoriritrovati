{% extends "base.html" %}

{% block title %}Scheda Profilo{% endblock %}

{% block content %}

<h2>Profilo Utente</h2>

<!-- FORM PROFILO -->
<form id="profiloForm" method="POST" action="{{ url_for('salva_profilo') }}">
    <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ dati_utente[0] }}" required>
    </div>

    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ dati_utente[1] }}" required>
    </div>

    <div class="form-group password-wrapper">
        <label for="password">Password:</label>
        <div class="password-field">
            <input type="password" id="password" name="password" value="{{ dati_utente[2] }}" required>
            <button type="button" id="togglePassword" class="toggle-password-btn">👁️</button>
        </div>
    </div>

    <!-- Bottone che apre l’overlay -->
    <button type="button" id="saveButton" class="save-button">Salva Modifiche</button>
</form>
<!-- FINE FORM PROFILO -->


<!-- SEZIONE ADMIN -->
{% if tipo_utente == 1 %}

    <form method="GET" action="{{ url_for('aggiungi_prodotto') }}">
        <input type="submit" value="Aggiungi Prodotto" class="add-product-button">
    </form>

    <a href="{{ url_for('nuovo_admin_pagina') }}" class="add-product-button">
        Nuovo Admin
    </a>

{% else %}

    <form method="GET" action="{{ url_for('suggerisci_prodotto') }}">
        <input type="submit" value="Suggerisci Prodotto" class="suggest-product-button">
    </form>

{% endif %}


<!-- OVERLAY -->
<div id="confirmOverlay" class="overlay" style="display:none;">
    <div class="overlay-content">
        <h3>Conferma modifica profilo</h3>
        <p>Sei sicuro di voler modificare le informazioni?<br>
        <strong>L'azione è irreversibile.</strong></p>

        <div class="overlay-buttons">

            <button id="cancelConfirm" class="btn cancel-btn">Annulla</button>

            <form id="confirmForm" method="POST" action="{{ url_for('salva_profilo') }}">
                <input type="hidden" name="nome" id="confirmNome">
                <input type="hidden" name="email" id="confirmEmail">
                <input type="hidden" name="password" id="confirmPassword">
                <button type="submit" class="btn confirm-btn">Conferma</button>
            </form>

        </div>
    </div>
</div>


<!-- SCRIPT OVERLAY -->
<script>
document.getElementById("saveButton").addEventListener("click", function() {
    // Copia i valori nel form nascosto
    document.getElementById("confirmNome").value = document.getElementById("nome").value;
    document.getElementById("confirmEmail").value = document.getElementById("email").value;
    document.getElementById("confirmPassword").value = document.getElementById("password").value;

    // Mostra overlay
    document.getElementById("confirmOverlay").style.display = "flex";
});

document.getElementById("cancelConfirm").addEventListener("click", function() {
    document.getElementById("confirmOverlay").style.display = "none";
});
</script>

{% endblock %}
