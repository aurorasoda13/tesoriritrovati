{% extends "base.html" %}

{% block title %}Modifica Prodotto{% endblock %}

{% block content %}
<h1>Modifica Prodotto</h1>
<div class="admin-section">


    <form id="addForm"
          action="/modifica/{{ prodotto[4] }}/upload"
          method="POST"
          enctype="multipart/form-data"
          >

        <label for="nome">Nome prodotto</label>
        <input type="text" id="nome" name="nome" value="{{ prodotto[0] }}" required>

        <label for="prezzo">Prezzo (€)</label>
        <input type="number" id="prezzo" step="0.01" name="prezzo" value="{{ prodotto[1] }}" required>

        <label for="disp">Disponibilità</label>
        <input type="number" id="disp" name="disp" min="1" value="{{ prodotto[2] }}" required>

        <label for="descrizione">Descrizione</label>
        <textarea id="descrizione" name="descrizione" rows="10">{{ prodotto[5] }}</textarea>    

        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo" required>
            {% for tipo in tipi %}
                <option value="{{ tipo[0] }}" {% if tipo[0] == prodotto[3] %}selected{% endif %}>{{ tipo[1] }}</option>
            {% endfor %}
        </select>

        <label for="image">Immagine</label>
        <input type="file" id="image" name="image" accept="image/*">

        <input type="submit" value="Salva modifiche">
    </form>
</div>
{% endblock %}
