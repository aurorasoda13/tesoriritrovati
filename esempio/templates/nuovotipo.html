{% extends "base.html" %}

{% block title %}Nuovo Tipo{% endblock %}

{% block content %}
<h1>Tipi di Prodotto</h1>
<ul>
    {% for tipo in tipi %}
        <li>{{ tipo[1] }}</li>
    {% endfor %}
</ul>
<h1>Nuovo Tipo</h1>
<form method="POST" action="/nuovotipo/aggiungi">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" required>
    <button type="submit">Crea Tipo Prodotto</button>
</form>
{% endblock %}
