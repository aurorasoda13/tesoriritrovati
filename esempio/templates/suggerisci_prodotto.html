{% extends "base.html" %}

{% block title %}Suggerisci un prodotto{% endblock %}

{% block content %}

<h1 style="text-align:center;">Suggerisci un prodotto</h1>

<div class="admin-section">

    <form action="/suggerimento" method="POST" enctype="multipart/form-data">

        <label for="nome">Nome prodotto</label>
        <input type="text" id="nome" name="nome" required>

        <label for="prezzo">Prezzo (€)</label>
        <input type="number" id="prezzo" name="prezzo" step="0.01" required>

        <label for="disp">Disponibilità</label>
        <input type="number" id="disp" name="disp" min="0" required>

        <!-- QUI: tipo scritto, NON select -->
        <label for="tipo">Tipo prodotto</label>
        <input type="text" id="tipo" name="tipo" placeholder="Es: Antiquariato, Libri, Ceramiche..." required>

        <label for="descrizione">Descrizione</label>
        <textarea id="descrizione" name="descrizione" rows="6" required></textarea>

        <label for="foto_suggerimento">Foto del prodotto</label>
        <input type="file" id="foto_suggerimento" name="foto_suggerimento" accept="image/*" required>

        <input type="submit" value="Invia suggerimento">
    </form>

</div>

{% endblock %}
