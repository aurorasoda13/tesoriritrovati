{% extends "base.html" %}

{% block title %}Aggiungi Prodotto{% endblock %}

{% block content %}
<h1>Aggiungi Prodotto</h1>
<div class="admin-section">


    <form id="addForm"
          action="/aggiungi_prodotto/upload"
          method="POST"
          enctype="multipart/form-data"
          >

        <label for="nome">Nome prodotto</label>
        <input type="text" id="nome" name="nome" required>

        <label for="prezzo">Prezzo (€)</label>
        <input type="number" id="prezzo" step="0.01" name="prezzo" required>

        <label for="disp">Disponibilità</label>
        <input type="number" id="disp" name="disp" min="1" required>

        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo" required>
            {% for tipo in tipi %}
                <option value="{{ tipo[0] }}">{{ tipo[1] }}</option>
            {% endfor %}
        </select>

        <label for="image">Immagine</label>
        <input type="file" id="image" name="image" accept="image/*" required>

        <input type="submit" value="Aggiungi prodotto">
    </form>
</div>
{% endblock %}
